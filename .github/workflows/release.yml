name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-from-tag \
            --verify-tag

      - name: Update floating major version tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract major version (e.g. "v1" from "v1.2.3")
          MAJOR_TAG=$(echo "${{ github.ref_name }}" | grep -oE '^v[0-9]+')

          # Force-update the major tag to point at this commit
          git tag --force "$MAJOR_TAG"
          git push origin --force "refs/tags/${MAJOR_TAG}"

          echo "Updated ${MAJOR_TAG} -> ${{ github.ref_name }}"
