name: "Versed Code Review"
description: "AI-powered code review for your pull requests using Versed"

branding:
  icon: shield
  color: blue

inputs:
  api_token:
    description: "Your Versed API token"
    required: true
  repo_id:
    description: "Your Versed Repo ID"
    required: true
  api_url:
    description: "Versed API URL"
    required: false
    default: "https://api.useversed.com"

runs:
  using: "composite"
  steps:
    - name: Run Versed Review
      shell: bash
      env:
        VERSED_API_TOKEN: ${{ inputs.api_token }}
        VERSED_REPO_ID: ${{ inputs.repo_id }}
        VERSED_API_URL: ${{ inputs.api_url }}
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        REPO: ${{ github.repository }}
      run: ${{ github.action_path }}/entrypoint.sh
